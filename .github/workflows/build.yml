name: Build Shield BO4 PT-BR

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout com submódulos
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Instalar Visual Studio Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Gerar solução com Premake5
      run: |
        tools\premake5 vs2022

    - name: Compilar em Release
      run: |
        msbuild build\shield-development.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload do DLL
      uses: actions/upload-artifact@v4
      with:
        name: XInput9_1_0-PTBR
        path: build\bin\Release\XInput9_1_0.dll
